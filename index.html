<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4efe4">
    <meta name="description" content="quiet-sudoku は、集中を邪魔しない静かな数独PWAです。">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="quiet-sudoku">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icons/quiet-sudoku-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icons/quiet-sudoku-192.png">
    <title>quiet-sudoku</title>
    <link rel="stylesheet" href="src/style.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="title-block">
          <p class="eyebrow">quiet-sudoku</p>
          <h1>静かに解く、今日の数独</h1>
        </div>
        <button class="ghost-button" id="newTodayButton" type="button">今日の一問</button>
      </header>

      <section class="status-bar" aria-label="ゲーム状況">
        <label class="status-chip">
          <span class="sr-only">難易度</span>
          <select id="difficultySelect" aria-label="難易度を選ぶ">
            <option value="easy">Easy</option>
            <option value="normal">Normal</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <div class="status-chip timer-chip">
          <span class="sr-only">時間</span>
          <strong id="timerText">00:00</strong>
          <button class="pause-icon-button" id="pauseButton" type="button" aria-label="一時停止">⏸</button>
        </div>
        <div class="status-chip">
          <span>ミス</span>
          <strong id="mistakeCount">0</strong>
        </div>
        <div class="status-chip">
          <span>ヒント</span>
          <strong id="hintCount">0</strong>
        </div>
      </section>

      <section class="board-wrap" aria-label="数独盤面">
        <div class="sudoku-board" id="board"></div>
        <div class="pause-cover" id="pauseCover" hidden>
          <p>一時停止中</p>
          <button class="primary-button" id="resumeButton" type="button">再開</button>
        </div>
      </section>

      <section class="controls" aria-label="操作">
        <div class="tool-row">
          <button id="completeButton" type="button">コンプ</button>
          <button id="eraseButton" type="button">消す</button>
          <label class="note-toggle">
            <input id="noteMode" type="checkbox">
            <span>メモ</span>
          </label>
          <button id="hintButton" type="button">ヒント</button>
        </div>

        <div class="number-pad" aria-label="数字入力">
          <button type="button" data-number="1">1</button>
          <button type="button" data-number="2">2</button>
          <button type="button" data-number="3">3</button>
          <button type="button" data-number="4">4</button>
          <button type="button" data-number="5">5</button>
          <button type="button" data-number="6">6</button>
          <button type="button" data-number="7">7</button>
          <button type="button" data-number="8">8</button>
          <button type="button" data-number="9">9</button>
        </div>
      </section>

      <section class="hint-card" id="hintCard" aria-live="polite" hidden>
        <div class="hint-copy">
          <p class="eyebrow">ヒント</p>
          <h2 id="hintStepTitle">ヒント</h2>
          <p id="hintStepText"></p>
        </div>
        <div class="hint-actions">
          <button id="hintPrevButton" type="button">前へ</button>
          <button id="hintNextButton" type="button">次へ</button>
          <button class="primary-button" id="hintApplyButton" type="button">答えを入れる</button>
          <button id="hintCloseButton" type="button">閉じる</button>
        </div>
      </section>

      <section class="progress-panel" aria-label="進捗">
        <div class="info-card">
          <span class="status-label">クリア履歴</span>
          <p id="historyText">まだクリア履歴はありません。</p>
        </div>
        <div class="info-card">
          <span class="status-label">今日の一問</span>
          <p id="dailyText">日付から問題を選べる土台を用意しています。</p>
        </div>
      </section>

      <aside class="sponsor-box" id="sponsorBox" aria-label="スポンサー枠">
        <p class="sponsor-note">このアプリは、集中を邪魔しない広告掲載を目指しています。</p>
        <div class="sponsor-content">
          <div class="sponsor-image" id="sponsorImage" aria-hidden="true"></div>
          <div>
            <strong id="sponsorName">スポンサー募集中</strong>
            <p id="sponsorDescription">静かで誠実な掲載枠を準備中です。</p>
          </div>
        </div>
      </aside>
    </main>

    <dialog class="clear-dialog" id="clearDialog" aria-labelledby="clearTitle">
      <div class="clear-panel">
        <p class="eyebrow">clear</p>
        <h2 id="clearTitle">クリアしました</h2>
        <dl class="result-grid">
          <div>
            <dt>時間</dt>
            <dd id="clearTime">00:00</dd>
          </div>
          <div>
            <dt>ミス</dt>
            <dd id="clearMistakes">0</dd>
          </div>
          <div>
            <dt>ヒント</dt>
            <dd id="clearHints">0</dd>
          </div>
          <div>
            <dt>難易度</dt>
            <dd id="clearDifficulty">Easy</dd>
          </div>
        </dl>
        <div class="badge-list" id="clearBadges" aria-label="達成バッジ"></div>
        <div class="dialog-actions">
          <button class="primary-button" id="anotherPuzzleButton" type="button">もう1問</button>
          <button id="viewHistoryButton" type="button">今日の記録を見る</button>
          <button id="closeClearButton" type="button">閉じる</button>
        </div>
      </div>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="src/puzzles.js"></script>
    <script src="src/hints.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
